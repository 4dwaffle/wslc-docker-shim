name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore WslcDockerShim.slnx

      - name: Build solution
        run: dotnet build WslcDockerShim.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test WslcDockerShim.slnx --configuration Release --no-build --filter "Category!=Integration"
